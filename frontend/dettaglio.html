<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Veicolo - Demo Concessionario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo-link"><h1>Demo Concessionaria</h1></a>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <nav id="main-nav">
                <a href="/">Home</a>
                <a href="/contatti">Contattaci</a>
                <a href="/login" class="btn-admin" id="auth-btn">Accesso Admin</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="dettaglio-container" class="dettaglio-wrapper">
            <div class="loading">Caricamento dettagli...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Demo Concessionaria. Tutti i diritti riservati.</p>
        </div>
    </footer>

    <script>
        let currentImageIndex = 0;
        let allImages = [];
        
        async function caricaDettaglioVeicolo() {
            const urlParams = new URLSearchParams(window.location.search);
            const idVeicolo = urlParams.get('id');
            
            if (!idVeicolo) {
                window.location.href = '/';
                return;
            }
            
            try {
                const response = await fetch(`/api/veicoli/${idVeicolo}`);
                
                if (!response.ok) {
                    throw new Error('Veicolo non trovato');
                }
                
                const veicolo = await response.json();
                const container = document.getElementById('dettaglio-container');
                
                const immagini = veicolo.immagini || [veicolo.immagine];
                allImages = immagini; // Salva per il carousel
                
                container.innerHTML = `
                    <div class="dettaglio-content">
                        <div class="dettaglio-header">
                            <button onclick="window.location.href='/'" class="btn-back">← Torna alla lista</button>
                            <h2>${veicolo.marca} ${veicolo.modello}</h2>
                            <p class="prezzo-principale">€ ${veicolo.prezzo.toLocaleString()}</p>
                        </div>
                        
                        <div class="dettaglio-grid">
                            <div class="dettaglio-immagine">
                                <div class="dettaglio-carousel">
                                    <div class="dettaglio-carousel-main" style="position:relative;">
                                        <img id="main-image" src="${immagini[0]}" alt="${veicolo.marca} ${veicolo.modello}">
                                        ${immagini.length > 1 ? `
                                            <button class="carousel-btn prev" onclick="changeImage(-1)">&#8249;</button>
                                            <button class="carousel-btn next" onclick="changeImage(1)">&#8250;</button>
                                        ` : ''}
                                        <button class="gallery-fullscreen-btn" onclick="openFullscreen(currentImageIndex)" title="Schermo intero" aria-label="Apri immagine a schermo intero">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <polyline points="15 3 21 3 21 9"></polyline>
                                                <polyline points="9 21 3 21 3 15"></polyline>
                                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                                <line x1="3" y1="21" x2="10" y2="14"></line>
                                            </svg>
                                        </button>
                                    </div>
                                    ${immagini.length > 1 ? `
                                    <div class="dettaglio-thumbnails-wrapper" id="thumbs-wrapper">
                                        <button class="thumb-arrow prev" onclick="scrollThumbs(-1)" id="thumb-prev">&#8249;</button>
                                        <div class="dettaglio-thumbnails-viewport" id="thumbs-viewport">
                                            <div class="dettaglio-thumbnails-track" id="thumbs-track">
                                                ${immagini.map((img, i) => `
                                                    <div class="thumbnail ${i === 0 ? 'active' : ''}" onclick="goToImage(${i})" data-idx="${i}">
                                                        <img src="${img}" alt="Foto ${i+1}">
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <button class="thumb-arrow next" onclick="scrollThumbs(1)" id="thumb-next">&#8250;</button>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                            
                            <div class="dettaglio-info-principale">
                                <div class="info-card">
                                    <h3>Caratteristiche Principali</h3>
                                    <div class="info-grid">
                                        <div class="info-item">
                                            <span class="info-label">Anno</span>
                                            <span class="info-value">${veicolo.anno}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Chilometri</span>
                                            <span class="info-value">${veicolo.chilometri.toLocaleString()} km</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Carburante</span>
                                            <span class="info-value">${veicolo.carburante}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Cambio</span>
                                            <span class="info-value">${veicolo.cambio}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Colore</span>
                                            <span class="info-value">${veicolo.colore}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Porte</span>
                                            <span class="info-value">${veicolo.porte}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Potenza</span>
                                            <span class="info-value">${veicolo.potenza} CV</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Cilindrata</span>
                                            <span class="info-value">${veicolo.cilindrata} cc</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Trazione</span>
                                            <span class="info-value">${veicolo.trazione}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Posti</span>
                                            <span class="info-value">${veicolo.posti}</span>
                                        </div>
                                        <div class="info-item">
                                            <span class="info-label">Carrozzeria</span>
                                            <span class="info-value">${veicolo.carrozzeria}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="dettaglio-descrizione">
                            <div class="info-card">
                                <h3>Descrizione</h3>
                                <p>${veicolo.descrizione}</p>
                            </div>
                        </div>
                        
                        ${veicolo.optional && veicolo.optional.length > 0 ? `
                        <div class="dettaglio-optional">
                            <div class="info-card">
                                <h3>Optional e Accessori</h3>
                                <ul class="optional-list">
                                    ${veicolo.optional.map(opt => `<li>✓ ${opt}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="dettaglio-azioni">
                            <button class="btn-contatta">📞 Contattaci per info</button>
                            <button class="btn-prenota">📅 Prenota test drive</button>
                        </div>
                    </div>
                `;
                
                // Event listeners per i bottoni
                document.querySelector('.btn-contatta').addEventListener('click', () => {
                    alert('Per informazioni contattaci al: +39 02 1234567');
                });
                
                document.querySelector('.btn-prenota').addEventListener('click', () => {
                    alert('Per prenotare un test drive contattaci al: +39 02 1234567');
                });
                
            } catch (error) {
                console.error('Errore nel caricamento del veicolo:', error);
                document.getElementById('dettaglio-container').innerHTML = 
                    '<div class="error">Veicolo non trovato o errore nel caricamento.</div>' +
                    '<button onclick="window.location.href=\'/\'" class="btn-back">← Torna alla lista</button>';
            }
        }

        // Gestione Carousel + Thumbnails + Lightbox
        const THUMBS_VISIBLE = 5;
        let thumbOffset = 0; // quante thumbnail sono scrollate a sinistra

        function changeImage(direction) {
            currentImageIndex = (currentImageIndex + direction + allImages.length) % allImages.length;
            updateImage();
        }

        function goToImage(index) {
            currentImageIndex = index;
            updateImage();
        }

        function updateImage() {
            const mainImg = document.getElementById('main-image');
            if (mainImg && allImages[currentImageIndex]) {
                mainImg.src = allImages[currentImageIndex];
            }
            // Aggiorna thumbnail attiva
            document.querySelectorAll('.thumbnail').forEach((t, i) => {
                t.classList.toggle('active', i === currentImageIndex);
            });
            centreThumbOnCurrent();
            // Aggiorna lightbox se aperto
            const lbImg = document.querySelector('#lightbox-modal .lightbox-content img');
            if (lbImg) {
                lbImg.src = allImages[currentImageIndex];
                const counter = document.querySelector('#lightbox-modal .lightbox-counter');
                if (counter) counter.textContent = (currentImageIndex + 1) + ' / ' + allImages.length;
            }
        }

        function scrollThumbs(dir) {
            const track = document.getElementById('thumbs-track');
            if (!track) return;
            const total = allImages.length;
            const maxOffset = Math.max(0, total - THUMBS_VISIBLE);
            thumbOffset = Math.min(Math.max(thumbOffset + dir, 0), maxOffset);
            const thumbWidth = track.querySelector('.thumbnail') ? track.querySelector('.thumbnail').offsetWidth + 8 : 100;
            track.style.transform = 'translateX(-' + (thumbOffset * thumbWidth) + 'px)';
        }

        function centreThumbOnCurrent() {
            const half = Math.floor(THUMBS_VISIBLE / 2);
            const total = allImages.length;
            const maxOffset = Math.max(0, total - THUMBS_VISIBLE);
            thumbOffset = Math.min(Math.max(currentImageIndex - half, 0), maxOffset);
            const track = document.getElementById('thumbs-track');
            if (!track) return;
            const thumbWidth = track.querySelector('.thumbnail') ? track.querySelector('.thumbnail').offsetWidth + 8 : 100;
            track.style.transform = 'translateX(-' + (thumbOffset * thumbWidth) + 'px)';
        }

        function openFullscreen(index) {
            currentImageIndex = index;
            let modal = document.getElementById('lightbox-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'lightbox-modal';
                modal.className = 'lightbox-overlay';
                modal.innerHTML = `
                    <button class="lightbox-close" onclick="closeFullscreen()" title="Chiudi">&#10005;</button>
                    <button class="lightbox-nav prev" onclick="lightboxNav(-1)">&#8249;</button>
                    <div class="lightbox-content"><img src="" alt=""></div>
                    <button class="lightbox-nav next" onclick="lightboxNav(1)">&#8250;</button>
                    <div class="lightbox-counter"></div>
                `;
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) closeFullscreen();
                });
                document.body.appendChild(modal);
            }
            const img = modal.querySelector('.lightbox-content img');
            img.src = allImages[currentImageIndex];
            modal.querySelector('.lightbox-counter').textContent = (currentImageIndex + 1) + ' / ' + allImages.length;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeFullscreen() {
            const modal = document.getElementById('lightbox-modal');
            if (modal) modal.style.display = 'none';
            document.body.style.overflow = '';
        }

        function lightboxNav(dir) {
            currentImageIndex = (currentImageIndex + dir + allImages.length) % allImages.length;
            updateImage();
        }

        // Navigazione tastiera
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('lightbox-modal');
            const isOpen = modal && modal.style.display === 'flex';
            if (e.key === 'Escape' && isOpen) { closeFullscreen(); return; }
            if (e.key === 'ArrowLeft') { isOpen ? lightboxNav(-1) : changeImage(-1); }
            if (e.key === 'ArrowRight') { isOpen ? lightboxNav(1) : changeImage(1); }
        });

        // Carica i dettagli all'avvio
        caricaDettaglioVeicolo();

        // Auth navbar
        (function() {
            const token = localStorage.getItem('authToken');
            const userInfo = localStorage.getItem('userInfo');
            const info = userInfo ? JSON.parse(userInfo) : null;
            const authBtn = document.getElementById('auth-btn');
            if (token && info && info.role === 'admin') {
                authBtn.textContent = 'Logout';
                authBtn.href = '#';
                authBtn.onclick = (e) => {
                    e.preventDefault();
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userInfo');
                    window.location.reload();
                };
            }
        })();
    </script>

    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('main-nav').classList.toggle('open');
            this.classList.toggle('active');
        });
        document.querySelectorAll('#main-nav a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('main-nav').classList.remove('open');
                document.getElementById('hamburger').classList.remove('active');
            });
        });
    </script>
</body>
</html>
