<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Demo Concessionario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<!-- Page Loader -->
<div id="page-loader">
    <div class="loader-logo">Demo <span>Concessionaria</span></div>
    <div class="loader-bar"></div>
</div>
<script>
(function(){
    var loader = document.getElementById('page-loader');
    if(!loader) return;
    function hide(){
        loader.style.opacity='0';
        loader.style.pointerEvents='none';
        loader.style.transition='opacity 0.5s ease';
        setTimeout(function(){ loader.remove(); }, 600);
    }
    setTimeout(hide, 1400);
})();
</script>

    <header>
        <div class="container">
            <a href="/" class="logo-link"><h1>Demo Concessionaria</h1></a>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <nav id="main-nav">
                <a href="/">Home</a>
                <a href="/contatti">Contattaci</a>
                <a href="/login" class="btn-admin active">Accesso Admin</a>
            </nav>
        </div>
    </header>

    <section class="login-hero">
        <canvas id="login-canvas"></canvas>
        <div class="login-hero-gradient"></div>

        <div class="login-card reveal">
            <div class="login-card-accent"></div>
            <div class="login-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <circle cx="12" cy="16" r="1"/>
                </svg>
            </div>
            <h2>Area Riservata</h2>
            <p class="login-subtitle">Inserisci le tue credenziali per accedere</p>

            <form id="login-form" autocomplete="off">
                <div class="login-field">
                    <input type="text" id="username" name="username" required placeholder=" ">
                    <label for="username">Username</label>
                    <span class="login-field-line"></span>
                </div>
                <div class="login-field">
                    <input type="password" id="password" name="password" required placeholder=" ">
                    <label for="password">Password</label>
                    <span class="login-field-line"></span>
                </div>
                <button type="submit" class="login-btn">
                    <span>Accedi</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>
                <div id="message" class="login-message"></div>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Demo Concessionaria. Tutti i diritti riservati.</p>
        </div>
    </footer>

    <script>
        // ─── LOGIN FORM ──────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.login-btn');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success && data.token) {
                    messageDiv.className = 'login-message success';
                    messageDiv.textContent = 'Accesso effettuato!';
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userInfo', JSON.stringify(data.user));
                    btn.innerHTML = '<span>✓ Benvenuto</span>';
                    setTimeout(() => { window.location.href = '/'; }, 800);
                } else {
                    messageDiv.className = 'login-message error';
                    messageDiv.textContent = data.message || 'Credenziali non valide';
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    const card = document.querySelector('.login-card');
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 600);
                }
            } catch (error) {
                messageDiv.className = 'login-message error';
                messageDiv.textContent = 'Errore di connessione al server';
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // ─── HAMBURGER ───────────────────────────────────────────────
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('main-nav').classList.toggle('open');
            this.classList.toggle('active');
        });
        document.querySelectorAll('#main-nav a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('main-nav').classList.remove('open');
                document.getElementById('hamburger').classList.remove('active');
            });
        });

        // ─── HEADER SCROLL ───────────────────────────────────────────
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            if (header) header.classList.toggle('scrolled', window.scrollY > 60);
        }, { passive: true });

        // ─── SCROLL REVEAL ───────────────────────────────────────────
        const revealObs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

        // ─── CANVAS PARTICLES ────────────────────────────────────────
        (function() {
            const canvas = document.getElementById('login-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
            resize();
            window.addEventListener('resize', resize, { passive: true });

            const N = 40;
            const particles = Array.from({ length: N }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.4,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                alpha: Math.random() * 0.4 + 0.1
            }));

            function draw() {
                if (!canvas.width || !canvas.height) { requestAnimationFrame(draw); return; }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(201,169,97,${0.1 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                    const p = particles[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(201,169,97,${p.alpha})`;
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ─── RIPPLE ──────────────────────────────────────────────────
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.login-btn');
            if (!btn) return;
            const ripple = document.createElement('span');
            ripple.classList.add('ripple-effect');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
            btn.style.position = 'relative';
            btn.style.overflow = 'hidden';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
        });
    </script>
</body>
</html>
